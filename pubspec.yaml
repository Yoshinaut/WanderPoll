name: wonder_poll
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_svg: ^2.3.0
  google_fonts: ^8.1.0
  flutter_speed_dial: ^7.0.0
  sqflite: ^2.4.3
  image_picker: ^1.1.2
  path_provider: ^2.1.2
  path: ^1.9.0
  flutter_card_swiper: ^7.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/svg/

  fonts:
    - family: Fredoka
      fonts:
        - asset: assets/fonts/Fredoka-Regular.ttf
          style: normal
          weight: 400
        - asset: assets/fonts/Fredoka-Medium.ttf
          weight: 500
        - asset: assets/fonts/Fredoka-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Fredoka-Light.ttf
          weight: 200
        - asset: assets/fonts/Fredoka-Bold.ttf
          weight: 700
    - family: Poppins
      fonts:
      - asset: assets/fonts/Poppins/Poppins-Regular.ttf
      - asset: assets/fonts/Poppins/Poppins-italic.ttf
        style: italic
      - asset: assets/fonts/Poppins/Poppins-Bold.ttf


flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/icon.png"
  min_sdk_android: 21 # required if your minimum Android SDK is under 21